<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APG Korea 업무대시보드</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-left">
    <div class="header-logo">A</div>
    <h1 class="header-title">APG <span>Korea</span> 업무대시보드</h1>
  </div>
  <div class="header-right">
    <div class="date-display" id="currentDate"></div>
    <div class="period-tabs">
      <button class="period-tab active" data-period="this-week">이번주</button>
      <button class="period-tab" data-period="last-week">저번주</button>
      <button class="period-tab" data-period="this-month">이번달</button>
    </div>
  </div>
</header>

<!-- ── NAV TABS ── -->
<nav class="nav-tabs-bar">
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="work">📋 업무현황</button>
    <button class="nav-tab" data-view="fieldwork">🚗 외근일정</button>
    <button class="nav-tab" data-view="leave">🌴 휴가현황</button>
  </div>
</nav>

<!-- ── MAIN ── -->
<main class="main" id="app">

  <!-- ====== VIEW: 업무현황 ====== -->
  <div class="view-section active" id="view-work">

    <!-- STAT STRIP -->
    <div class="stat-strip">
      <div class="stat-card">
        <div class="stat-label">총 업무시간</div>
        <div class="stat-value" id="stat-hours" style="color:#6C5CE7">—</div>
        <div class="stat-sub">시간</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">총 업무 건수</div>
        <div class="stat-value" id="stat-tasks" style="color:#00B894">—</div>
        <div class="stat-sub" id="stat-submitters">건</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">완료율</div>
        <div class="stat-value" id="stat-done" style="color:#FDCB6E">—</div>
        <div class="stat-sub">완료 비율</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">이슈</div>
        <div class="stat-value" id="stat-issues" style="color:#E17055">—</div>
        <div class="stat-sub">건 접수</div>
      </div>
    </div>

    <!-- CHARTS GRID -->
    <p class="section-title">📊 주간 현황</p>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-card-title">
          <div class="icon" style="background:rgba(108,92,231,0.2)">👤</div>
          팀원별 업무시간
        </div>
        <div class="chart-wrap">
          <canvas id="memberHoursChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">
          <div class="icon" style="background:rgba(0,184,148,0.2)">🗂</div>
          업무 카테고리 분포
        </div>
        <div class="chart-wrap">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">
          <div class="icon" style="background:rgba(253,203,110,0.2)">📋</div>
          업무 상태 분포
        </div>
        <div class="chart-wrap">
          <canvas id="statusChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">
          <div class="icon" style="background:rgba(116,185,255,0.2)">📈</div>
          주간 업무시간 추이
        </div>
        <div class="chart-wrap">
          <canvas id="weeklyTrendChart"></canvas>
        </div>
      </div>
    </div>

    <!-- MEMBER CARDS -->
    <p class="section-title">👥 팀원별 상세</p>
    <div class="members-grid" id="memberCards">
      <!-- JS로 렌더링 -->
    </div>

    <!-- BOTTOM: ISSUES + MISSING -->
    <div class="bottom-grid">
      <div class="issue-board">
        <p class="section-title" style="margin-bottom:16px">⚠️ 이슈 보드</p>
        <div class="issue-list" id="issueList"></div>
      </div>
      <div class="missing-report">
        <p class="section-title" style="margin-bottom:16px">🔴 미제출 현황</p>
        <div class="missing-list" id="missingList"></div>
      </div>
    </div>

  </div><!-- /view-work -->


  <!-- ====== VIEW: 외근일정 ====== -->
  <div class="view-section" id="view-fieldwork">

    <div class="schedule-header-row">
      <p class="section-title" style="margin-bottom:0">🚗 외근 일정</p>
      <span class="sched-period-label" id="fieldwork-period-label"></span>
    </div>

    <!-- 이번주 외근 카드 -->
    <div class="fieldwork-cards" id="fieldworkCards"></div>

    <!-- 이번 달 미니 캘린더 -->
    <p class="section-title" style="margin-top:28px">📅 이번 달 외근 캘린더</p>
    <div class="schedule-card">
      <div class="mini-calendar" id="fieldworkCalendar"></div>
    </div>

  </div><!-- /view-fieldwork -->


  <!-- ====== VIEW: 휴가현황 ====== -->
  <div class="view-section" id="view-leave">

    <div class="schedule-header-row">
      <p class="section-title" style="margin-bottom:0">🌴 휴가 현황</p>
      <span class="sched-period-label" id="leave-period-label"></span>
    </div>

    <!-- 이번 달 휴가 캘린더 -->
    <div class="schedule-card">
      <div class="leave-legend" id="leaveLegend"></div>
      <div class="leave-calendar" id="leaveCalendar"></div>
    </div>

    <!-- 휴가 목록 -->
    <p class="section-title" style="margin-top:28px">📋 휴가 신청 내역</p>
    <div class="leave-list-wrap" id="leaveList"></div>

  </div><!-- /view-leave -->

</main>

<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
